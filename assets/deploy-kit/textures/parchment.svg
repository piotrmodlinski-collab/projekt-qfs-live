<svg xmlns="http://www.w3.org/2000/svg" width="1024" height="1024" viewBox="0 0 1024 1024">
  <defs>
    <linearGradient id="paper" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#f0e7c8"/>
      <stop offset="55%" stop-color="#dfd2ac"/>
      <stop offset="100%" stop-color="#b7a57f"/>
    </linearGradient>
    <filter id="noise">
      <feTurbulence type="fractalNoise" baseFrequency="0.8" numOctaves="2" stitchTiles="stitch"/>
      <feColorMatrix values="0 0 0 0 0.5 0 0 0 0 0.45 0 0 0 0 0.35 0 0 0 0.15 0"/>
    </filter>
  </defs>
  <rect width="1024" height="1024" fill="url(#paper)"/>
  <rect width="1024" height="1024" filter="url(#noise)" opacity="0.35"/>
  <g stroke="#8f7c58" stroke-opacity="0.35" stroke-width="5">
    <line x1="140" y1="260" x2="884" y2="260"/>
    <line x1="140" y1="390" x2="884" y2="390"/>
    <line x1="140" y1="520" x2="884" y2="520"/>
    <line x1="140" y1="650" x2="884" y2="650"/>
  </g>
</svg>
